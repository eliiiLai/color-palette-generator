<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>

    <!-- Link to external CSS file不能用style标签 -->
    <link rel="stylesheet" href="style.css" />

    <!-- 
      type="module" does two things:
      1. Enables import/export syntax (ES modules)
      2. Defers execution automatically: script runs after HTML is fully loaded（默认延迟执行，不需要额外写defer）
    -->
    <script type="module" src="main.js"></script>
</head>

<body>

    <header>
        <h1>Color Palette Generator</h1>

        <!-- Harmony mode selector — user picks before generating 选择配色模式 -->
        <div id="harmony-selector">
            <label for="harmony-select">Harmony:</label>
            <select id="harmony-select">
                <option value="analogous">Analogous</option>
                <option value="complementary">Complementary</option>
                <option value="triadic">Triadic</option>
                <option value="split-comp">Split-comp</option>
            </select>
        </div>

        <button id="generate-btn">Generate palette</button>
    </header>

    <!-- Hint text for harmony mode and shuffle behavior -->
    <p id="hint-text">Select a harmony mode and click <strong>Generate palette</strong> to create a new palette. To reshuffle a single color, use the <strong>Shuffle</strong> button on each card — it follows the currently selected harmony mode.</p>

    <!-- Color cards will be dynamically generated by JS 色卡由 JS 动态生成 -->
    <main id="palette-container"></main>

    <!-- Color cards will be dynamically generated by JS 色卡由 JS 动态生成 -->
    <main id="palette-container"></main>

</body>

</html>
