<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Enables import/export syntax (ES modules) -->
    <script type="module" src="main.js"></script>
</head>

<body>

    <header>
        <h1>Color Palette Generator</h1>

        <!-- Harmony mode selector — user picks before generating -->
        <div id="harmony-selector">
            <label for="harmony-select">Harmony:</label>
            <select id="harmony-select">
                <option value="analogous">Analogous</option>
                <option value="complementary">Complementary</option>
                <option value="triadic">Triadic</option>
                <option value="split-comp">Split-comp</option>
            </select>
        </div>

        <button id="generate-btn">Generate palette</button>
    </header>

    <!-- Hint text for harmony mode and shuffle behavior -->
    <p id="hint-text">Select a harmony mode and click <strong>Generate palette</strong> to create a new palette. To
        reshuffle a single color, use the <strong>Shuffle</strong> button on each card — it follows the currently
        selected harmony mode.</p>

    <!-- Color cards will be dynamically generated by JS-->
    <main id="palette-container"></main>

    <!-- 
      Citations:
      - The Color API (https://www.thecolorapi.com): used to fetch color names
      - HSL to hex conversion formula adapted from: https://stackoverflow.com/questions/2353211/hsl-to-rgb-color-conversion
    -->
</body>

</html>
